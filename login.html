<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atlas Finance - Acesso</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600&display=swap");

        :root {
            --bg: #eef3ff;
            --card: rgba(255, 255, 255, 0.92);
            --ink: #0f1a2b;
            --muted: #516079;
            --accent: #2563eb;
            --danger: #dc2626;
            --shadow: 0 18px 50px rgba(9, 26, 59, 0.18);
            --radius: 16px;
            --border: #dbe4ff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(1200px 600px at 10% -10%, rgba(37, 99, 235, 0.18) 0%, transparent 55%),
                radial-gradient(900px 500px at 100% 0%, rgba(239, 68, 68, 0.16) 0%, transparent 55%),
                var(--bg);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            position: relative;
        }

        .card {
            width: min(420px, 100%);
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            border: 1px solid rgba(219, 228, 255, 0.7);
            position: relative;
            z-index: 2;
            pointer-events: auto;
        }

        .card * { pointer-events: auto; }

        h1 {
            margin: 0 0 6px;
            font-size: 1.9rem;
        }

        .subtitle {
            color: var(--muted);
            font-family: "Playfair Display", serif;
            margin: 0 0 16px;
        }

        form { display: grid; gap: 10px; }
        label { font-size: 0.85rem; color: var(--muted); }
        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
            font-size: 0.95rem;
            padding-right: 52px;
        }

        button {
            border: none;
            background: var(--accent);
            color: #fff;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .muted { color: var(--muted); font-size: 0.85rem; }
        .error { color: var(--danger); font-size: 0.85rem; }
        .success { color: #1f7a58; font-size: 0.85rem; }
        .tabs {
            display: grid;
            grid-template-columns: repeat(2, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
            position: relative;
            z-index: 2;
        }
        .tab-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 10px 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .link-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 8px 10px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .hint {
            font-size: 0.8rem;
            color: var(--muted);
        }
        .password-row {
            position: relative;
        }
        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            z-index: 2;
            pointer-events: auto;
        }
        #click-debug {
            position: fixed;
            left: 10px;
            bottom: 10px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.8rem;
            color: var(--muted);
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Atlas Finance</h1>
        <p class="subtitle">Crie sua conta para acessar o painel.</p>
        <div class="tabs">
            <a id="tab-signup" class="tab-btn active" href="#signup">Criar conta</a>
            <a id="tab-login" class="tab-btn" href="#login">Entrar</a>
        </div>

        <form id="signup-form" novalidate>
            <div>
                <label for="name">Nome</label>
                <input id="name" name="name" required />
            </div>
            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>
            <div class="password-row">
                <label for="password">Senha</label>
                <input id="password" name="password" type="password" minlength="6" required />
                <button type="button" class="toggle-btn" data-toggle="password">Ver</button>
            </div>
            <div class="hint">Senha forte: minimo 8 caracteres, com letra maiuscula, minuscula e numero.</div>
            <button type="submit">Criar conta</button>
            <div id="signup-msg" class="muted"></div>
        </form>

        <form id="login-form" style="display:none;" novalidate>
            <div>
                <label for="login-email">Email</label>
                <input id="login-email" name="login-email" type="email" required />
            </div>
            <div class="password-row">
                <label for="login-password">Senha</label>
                <input id="login-password" name="login-password" type="password" minlength="6" required />
                <button type="button" class="toggle-btn" data-toggle="login-password">Ver</button>
            </div>
            <button type="submit">Entrar</button>
            <div id="login-msg" class="muted"></div>
            <button id="forgot-btn" class="link-btn" type="button">Esqueci minha senha</button>
        </form>

        <form id="reset-form" style="display:none;" novalidate>
            <div>
                <label for="reset-email">Email</label>
                <input id="reset-email" name="reset-email" type="email" required />
            </div>
            <button type="submit">Enviar email de redefinicao</button>
            <div id="reset-msg" class="muted"></div>
            <button id="reset-back" class="link-btn" type="button">Voltar ao login</button>
        </form>
    </div>
    <div id="click-debug">JS carregando…</div>

    <script src="login.js" defer></script>
</body>
</html>
